name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 685222356746.dkr.ecr.us-east-1.amazonaws.com
  AWS_ROLE_ARN: arn:aws:iam::685222356746:role/jfc-ecommerce-github-actions

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build & Push images to ECR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build & push frontend
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/jfc-ecommerce/frontend:${{ steps.meta.outputs.tag }} frontend/
          docker tag ${{ env.ECR_REGISTRY }}/jfc-ecommerce/frontend:${{ steps.meta.outputs.tag }} \
                     ${{ env.ECR_REGISTRY }}/jfc-ecommerce/frontend:latest
          docker push ${{ env.ECR_REGISTRY }}/jfc-ecommerce/frontend:${{ steps.meta.outputs.tag }}
          docker push ${{ env.ECR_REGISTRY }}/jfc-ecommerce/frontend:latest

      - name: Build & push backend
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/jfc-ecommerce/backend:${{ steps.meta.outputs.tag }} backend/
          docker tag ${{ env.ECR_REGISTRY }}/jfc-ecommerce/backend:${{ steps.meta.outputs.tag }} \
                     ${{ env.ECR_REGISTRY }}/jfc-ecommerce/backend:latest
          docker push ${{ env.ECR_REGISTRY }}/jfc-ecommerce/backend:${{ steps.meta.outputs.tag }}
          docker push ${{ env.ECR_REGISTRY }}/jfc-ecommerce/backend:latest

  deploy-dev:
    name: Deploy → dev
    runs-on: ubuntu-latest
    needs: build
    environment: dev

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: Oslan17/jfc-ecommerce-aws-infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'

      - name: Configure kubeconfig
        run: aws eks update-kubeconfig --name jfc-ecommerce-dev --region ${{ env.AWS_REGION }}

      - name: Update image tags in overlay
        run: |
          cd kubernetes/overlays/dev
          kustomize edit set image jfc-ecommerce/frontend=${{ env.ECR_REGISTRY }}/jfc-ecommerce/frontend:${{ needs.build.outputs.image_tag }}
          kustomize edit set image jfc-ecommerce/backend=${{ env.ECR_REGISTRY }}/jfc-ecommerce/backend:${{ needs.build.outputs.image_tag }}

      - name: Deploy to dev
        run: kubectl apply -k kubernetes/overlays/dev/

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/jfc-frontend -n dev --timeout=300s
          kubectl rollout status deployment/jfc-backend  -n dev --timeout=300s

      - name: Show status
        if: always()
        run: kubectl get pods -n dev && kubectl get ingress -n dev

  deploy-prod:
    name: Deploy → prod
    runs-on: ubuntu-latest
    needs: [build, deploy-dev]
    environment: prod        # ← pausa aquí hasta que apruebes en GitHub

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: Oslan17/jfc-ecommerce-aws-infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'

      - name: Configure kubeconfig
        run: aws eks update-kubeconfig --name jfc-ecommerce-dev --region ${{ env.AWS_REGION }}

      - name: Update image tags in overlay
        run: |
          cd kubernetes/overlays/prod
          kustomize edit set image jfc-ecommerce/frontend=${{ env.ECR_REGISTRY }}/jfc-ecommerce/frontend:${{ needs.build.outputs.image_tag }}
          kustomize edit set image jfc-ecommerce/backend=${{ env.ECR_REGISTRY }}/jfc-ecommerce/backend:${{ needs.build.outputs.image_tag }}

      - name: Deploy to prod
        run: kubectl apply -k kubernetes/overlays/prod/

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/jfc-frontend -n prod --timeout=300s
          kubectl rollout status deployment/jfc-backend  -n prod --timeout=300s

      - name: Show status
        if: always()
        run: kubectl get pods -n prod && kubectl get ingress -n prod
